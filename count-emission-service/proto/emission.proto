syntax = "proto3";

package pb;

option go_package = "./proto/generated";

import "google/api/annotations.proto";

service Emission {
    rpc CreateUserEmission (EmissionBody) returns (PostRespon) {
        option (google.api.http) = {
        post: "/v1/emissions"
        body: "*"
    };
    }
    rpc GetUserDailyEmission (Empty) returns (UserDailyEmission){
        option (google.api.http) = {
        get: "/v1/emissions/today"
    };
    }

    rpc GetUserMonthlyEmission (Empty) returns (UserMonthlyEmission){
        option (google.api.http) = {
        get: "/v1/emissions/monthly"
    };
    }

    rpc GetUserYearlyEmission (Empty) returns (UserYearlyEmission){
        option (google.api.http) = {
        get: "/v1/emissions/yearly"
    };
    }
}

message Empty {}

message EmissionBody {
  int32 user_id = 1;
  string vehicle_type = 2;
  string fuel_type = 3;
  double distance_km = 4;
}

message PostRespon {
    string message = 1;
}

message UserDailyEmission {
  int32 user_id = 1;
  string date = 2;
  double total_emission_kg_co2 = 3;
}

message UserMonthlyEmissionDetail {
  string month = 1;
  double total_emission_kg_co2 = 2;
}

message UserMonthlyEmission {
  int32 user_id = 1;
  repeated UserDailyEmission daily_emissions = 2;
  double total_emission_monthly_kg_co2 = 3;
}

message UserYearlyEmission {
  int32 user_id = 1;
  repeated UserMonthlyEmissionDetail monthly_emissions = 2;
  double total_emission_yearly_kg_co2 = 3;
}