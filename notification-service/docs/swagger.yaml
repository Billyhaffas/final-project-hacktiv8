info:
  contact: {}
  description: This is a microservice responsible for validating user carbon emission
    thresholds and managing notifications.
  title: Notification API
  version: "1.0"
paths:
  /api/v1/notifications/check-emission:
    post:
      consumes:
      - application/json
      description: Fetches recent emission counts, compares them against user preferences
        or MongoDB master fallbacks, and triggers a warning if breached.
      parameters:
      - description: User Identification ID
        in: query
        name: user_id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: 'Example: {''status'':''success'',''limit_breached'':true,''message'':''Alert!...''}'
          schema:
            additionalProperties: true
            type: object
        "400":
          description: 'Example: {''error'':''invalid or missing user_id query param''}'
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: 'Example: {''error'':''internal database failure''}'
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Check and trigger emission notifications
      tags:
      - notifications
swagger: "2.0"
