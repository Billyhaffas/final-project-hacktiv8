definitions:
  convert-emission-service_internal_domain.CarbonCostValuation:
    properties:
      total_cost_local_cur:
        type: number
      total_cost_usd:
        type: number
      total_emission_kg_co2:
        type: number
    type: object
  convert-emission-service_internal_domain.UserDailyCostResponse:
    properties:
      date:
        type: string
      user_id:
        type: integer
      valuation:
        $ref: '#/definitions/convert-emission-service_internal_domain.CarbonCostValuation'
    type: object
  convert-emission-service_internal_domain.UserDailyEmission:
    properties:
      date:
        type: string
      total_emission_kg_co2:
        type: number
      user_id:
        type: integer
    type: object
  convert-emission-service_internal_domain.UserMonthlyCostResponse:
    properties:
      daily_cost_detail:
        items:
          $ref: '#/definitions/convert-emission-service_internal_domain.UserDailyCostResponse'
        type: array
      total_valuation:
        $ref: '#/definitions/convert-emission-service_internal_domain.CarbonCostValuation'
      user_id:
        type: integer
    type: object
  convert-emission-service_internal_domain.UserMonthlyEmission:
    properties:
      daily_emissions:
        items:
          $ref: '#/definitions/convert-emission-service_internal_domain.UserDailyEmission'
        type: array
      total_emission_monthly_kg_co2:
        type: number
      user_id:
        type: integer
    type: object
  convert-emission-service_internal_domain.UserMonthlyEmissionDetail:
    properties:
      month:
        type: string
      total_emission_kg_co2:
        type: number
      user_id:
        type: integer
    type: object
  convert-emission-service_internal_domain.UserYearlyCostResponse:
    properties:
      monthly_cost_detail:
        items:
          $ref: '#/definitions/convert-emission-service_internal_domain.UserMonthlyCostResponse'
        type: array
      total_valuation:
        $ref: '#/definitions/convert-emission-service_internal_domain.CarbonCostValuation'
      user_id:
        type: integer
    type: object
  convert-emission-service_internal_domain.UserYearlyEmission:
    properties:
      monthly_emissions:
        items:
          $ref: '#/definitions/convert-emission-service_internal_domain.UserMonthlyEmissionDetail'
        type: array
      total_emission_yearly_kg_co2:
        type: number
      user_id:
        type: integer
    type: object
info:
  contact: {}
  description: This is a microservice responsible for converting carbon emission into
    local currency.
  title: Convert Emission API
  version: "1.0"
paths:
  /api/v1/convert/daily:
    post:
      consumes:
      - application/json
      description: Accepts raw user daily emissions in kg CO2 and translates them
        into financial costs (USD and local currency) using country carbon tax pricing
        data.
      parameters:
      - description: 3-letter country code (e.g., IDN, ARG)
        in: query
        name: country_code
        required: true
        type: string
      - description: Daily emission data
        in: body
        name: payload
        required: true
        schema:
          $ref: '#/definitions/convert-emission-service_internal_domain.UserDailyEmission'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/convert-emission-service_internal_domain.UserDailyCostResponse'
        "400":
          description: 'Example: {''error'': ''invalid country_code query param format''}'
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: 'Example: {''error'': ''internal database failure''}'
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Convert daily carbon emissions to currency valuation
      tags:
      - conversion
  /api/v1/convert/monthly:
    post:
      consumes:
      - application/json
      description: Accepts monthly aggregate emissions and breakdown lists, returning
        mapped cost breakdowns per day alongside totals.
      parameters:
      - description: 3-letter country code (e.g., IDN, ARG)
        in: query
        name: country_code
        required: true
        type: string
      - description: Monthly emission dataset
        in: body
        name: payload
        required: true
        schema:
          $ref: '#/definitions/convert-emission-service_internal_domain.UserMonthlyEmission'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/convert-emission-service_internal_domain.UserMonthlyCostResponse'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Convert monthly carbon emissions to currency valuation
      tags:
      - conversion
  /api/v1/convert/yearly:
    post:
      consumes:
      - application/json
      description: Accepts structural yearly datasets and returns complex valuation
        arrays grouped by calendar month.
      parameters:
      - description: 3-letter country code (e.g., IDN, ARG)
        in: query
        name: country_code
        required: true
        type: string
      - description: Yearly emission dataset
        in: body
        name: payload
        required: true
        schema:
          $ref: '#/definitions/convert-emission-service_internal_domain.UserYearlyEmission'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/convert-emission-service_internal_domain.UserYearlyCostResponse'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Convert yearly carbon emissions to currency valuation
      tags:
      - conversion
swagger: "2.0"
